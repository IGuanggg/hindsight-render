services:
  - type: web
    name: hindsight-service
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      alembic upgrade head
    startCommand: uvicorn core.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hindsight-db
          property: connectionString
      - key: LLM_PROVIDER
        value: bailian
      - key: BAILIAN_API_KEY
        sync: false
      - key: BAILIAN_BASE_URL
        value: https://coding.dashscope.aliyuncs.com/v1
      - key: BAILIAN_MODEL
        value: qwen3.5-plus
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: web
    name: hindsight-dashboard
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: API_URL
        value: https://hindsight-service.onrender.com

databases:
  - name: hindsight-db
    plan: free
    databaseName: hindsight_db
    user: hindsight
